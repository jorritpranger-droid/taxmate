<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #1A2C42;
      margin: 0;
    }
    h2 { margin: 0 0 8px; font-size: 15px; color: #1D4E89; display: flex; align-items: center; gap: 6px; }
    p  { margin: 0 0 12px; color: #4A6080; font-size: 12px; line-height: 1.5; }
    a  { display: block; background: linear-gradient(135deg,#1D4E89,#2563AB); color: white;
         text-decoration: none; padding: 9px 14px; border-radius: 6px; text-align: center;
         font-size: 13px; margin-bottom: 8px; }
    .status { font-size: 11px; color: #7A90A8; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>⚖️ TaxMate</h2>
  <p>Open Gmail to analyse emails for tax deductions directly in your inbox.</p>
  <a href="http://localhost:3000" target="_blank">Open TaxMate App</a>
  <a href="https://mail.google.com" target="_blank">Open Gmail</a>
  <div class="status" id="status">Checking server...</div>
  <script src="popup.js"></script>
</body>
</html>
